<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Admin Panel</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-utensils"></i><span class="brand-name">Homemade Delights</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
            <li><a href="categories.html" class="active"><i class="fas fa-tags"></i><span>Categories</span></a></li>
            <li><a href="menu.html"><i class="fas fa-utensils"></i><span>Menu Items</span></a></li>
            <li><a href="orders.html"><i class="fas fa-shopping-bag"></i><span>Orders</span></a></li>
            <li><a href="customers.html"><i class="fas fa-users"></i><span>Customers</span></a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-secondary me-3 d-lg-none" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h5 class="mb-0">Categories</h5>
            </div>
            <div class="d-flex align-items-center">
                <a href="../index.html" class="btn btn-sm btn-outline-primary" target="_blank"><i class="fas fa-external-link-alt me-1"></i>View Site</a>
            </div>
        </header>

        <div class="admin-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>Manage Categories</h4>
                <button class="btn btn-primary-custom" onclick="showAddCategoryModal()"><i class="fas fa-plus me-2"></i>Add Category</button>
            </div>

            <div class="admin-table" data-aos="fade-up">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Category Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalTitle">Add Category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm">
                        <input type="hidden" id="categoryIndex">
                        <input type="hidden" id="categoryId">
                        <div class="mb-3">
                            <label class="form-label">Category Name</label>
                            <input type="text" id="categoryName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Icon Class (Font Awesome)</label>
                            <input type="text" id="categoryIcon" class="form-control" placeholder="fa-bowl-rice" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="categoryDesc" class="form-control" rows="2" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-custom" onclick="saveCategory(event)">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
