<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin Panel</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-utensils"></i><span class="brand-name">Homemade Delights</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
            <li><a href="categories.html"><i class="fas fa-tags"></i><span>Categories</span></a></li>
            <li><a href="menu.html"><i class="fas fa-utensils"></i><span>Menu Items</span></a></li>
            <li><a href="orders.html"><i class="fas fa-shopping-bag"></i><span>Orders</span></a></li>
            <li><a href="customers.html"><i class="fas fa-users"></i><span>Customers</span></a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <!-- Header -->
        <header class="admin-header">
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-secondary me-3 d-lg-none" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h5 class="mb-0">Dashboard</h5>
            </div>
            <div class="d-flex align-items-center">
                <span class="text-muted me-3">Welcome, Admin</span>
                <a href="../index.html" class="btn btn-sm btn-outline-primary" target="_blank"><i class="fas fa-external-link-alt me-1"></i>View Site</a>
            </div>
        </header>

        <!-- Content -->
        <div class="admin-content">
            <!-- Stats Cards -->
            <div class="row mb-4">
                <div class="col-xl-3 col-md-6 mb-4">
                    <div class="dashboard-card" data-aos="fade-up">
                        <div class="icon primary"><i class="fas fa-shopping-bag"></i></div>
                        <div class="value" id="todayOrders">0</div>
                        <div class="label">Today's Orders</div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6 mb-4">
                    <div class="dashboard-card" data-aos="fade-up" data-aos-delay="100">
                        <div class="icon success"><i class="fas fa-rupee-sign"></i></div>
                        <div class="value" id="revenue">₹0</div>
                        <div class="label">Total Revenue</div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6 mb-4">
                    <div class="dashboard-card" data-aos="fade-up" data-aos-delay="200">
                        <div class="icon warning"><i class="fas fa-clock"></i></div>
                        <div class="value" id="pendingOrders">0</div>
                        <div class="label">Pending Orders</div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6 mb-4">
                    <div class="dashboard-card" data-aos="fade-up" data-aos-delay="300">
                        <div class="icon danger"><i class="fas fa-check-circle"></i></div>
                        <div class="value" id="deliveredOrders">0</div>
                        <div class="label">Delivered Orders</div>
                    </div>
                </div>
            </div>

            <!-- Recent Orders -->
            <div class="row">
                <div class="col-12">
                    <div class="admin-table" data-aos="fade-up">
                        <div class="d-flex justify-content-between align-items-center p-3">
                            <h5 class="mb-0">Recent Orders</h5>
                            <a href="orders.html" class="btn btn-sm btn-primary">View All</a>
                        </div>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Customer</th>
                                        <th>Total</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody id="recentOrders"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
